# Dobot CR5：开抽屉 → 取苹果 → 放置 → 关抽屉
#
# 回程：``robot.cache_ee_pose``（队列起势位姿）+ ``single_arm.goto_cache_pose``，与 ``pick_place.yaml`` 一致。
# 抽屉段为 ``single_arm.drawer.*``，与 pick/place 一样用 skill_defaults / skill_params；
# ``single_arm.drawer`` 下的字段会并入运行时扁平配置（MergedQueueConfig.drawer），并作为
# 各 ``single_arm.drawer.pull_open`` 等块的 params 底层默认值（见 merge.block_params / merge_task_queue_skill_params）。

task_key: drawer_pick_place
label: Drawer Pick Place
use_stamped: true
robot_id: dobot_cr5_pick_place
default_scene: drawer_001

task_queue:
  - skill: env.randomize_object_local_xyz
  # reset 后起始末端位姿作为回程参考；pick 已含张开接近，无需 pregrasp
  - skill: robot.cache_ee_pose
    params:
      key: cr5_drawer_prep_pose
  - skill: single_arm.drawer.pull_open
  - skill: single_arm.pick
  - skill: single_arm.place
  - skill: single_arm.drawer.close_push
  - skill: single_arm.goto_cache_pose
    params:
      key: cr5_drawer_prep_pose

base_task_overrides:
  max_stage_duration: 2.0
  pose_tol_pos: 0.001
  pose_tol_ori: 0.08
  require_orientation_reach: false
  use_object_orientation: false

skill_defaults:
  env.randomize_object_local_xyz:
    object_prim_path: /World/grasp_apple_drawer/apple/apple/apple
    xyz_offset: [0.3, 0.3, 0.0]
  single_arm.pick:
    arm: left
    prepare_offset: [0.0, 0.0, 0.08]
    retreat_direction_extra: 0.08
    object_prim_path: /World/grasp_apple_drawer/apple/apple/apple
    ee_base_orientation: [0.7, 0.7, 0.0, 0.0]
    grasp_direction: top
    grasp_direction_vector: [0, 0, 1]
  single_arm.place:
    run_place_before_return: true
    place_position: [-0.5211657941743888, 0.18339369774887115, 0.54]
    place_orientation: [0.64, 0.64, -0.28, -0.28]
    post_release_retract_offset: [0.0, -0.2, 0.0]
  single_arm.drawer:
    object_xyz_random_offset_drawer: [0.05, 0.05, 0.0]
    grasp_clearance_drawer: -0.003
    source_object_path_drawer_all: /World/grasp_apple_drawer/StorageFurniture135/StorageFurniture135
    drawer_scale: 0.85
    # 拉开行程（米，沿拉手 grasp 方向）
    pull_distance: 0.15

scene_presets:
  drawer_001:
    skill_params:
      single_arm.drawer:
        source_object_path_drawer: /World/grasp_apple_drawer/StorageFurniture135/StorageFurniture135_Drawer001
        handle_extent_max: [0.016881, -0.256626, 0.148597]
        handle_extent_min: [-0.019242, -0.265197, 0.12913]
  drawer_002:
    skill_params:
      single_arm.drawer:
        source_object_path_drawer: /World/grasp_apple_drawer/StorageFurniture135/StorageFurniture135_Drawer002
        handle_extent_max: [0.016881, -0.256626, -0.003418]
        handle_extent_min: [-0.019242, -0.265197, -0.022885]

record:
  base_record_overrides:
    task_name: drawer_pick_place
    fps: 30
    camera_info_timeout: 10.0
    enable_keypoint_pcd: false
    include_depth_feature: false
    image_writer_processes: 0
    image_writer_threads: 8
    video_encoding_batch_size: 5
  profiles:
    - key: default
      label: Default
      overrides: {}
    - key: fast
      label: Fast Encode Queue
      overrides:
        image_writer_threads: 12
        video_encoding_batch_size: 10
