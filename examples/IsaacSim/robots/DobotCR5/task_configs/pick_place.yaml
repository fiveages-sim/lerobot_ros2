# Dobot CR5 — pick / place（队列 + skill 参数分层）
#
# - base_task_overrides：仅流程级公共字段（容差等；mode 默认为 single_arm，可省略）
# - skill_defaults：与 task_queue 中 single_arm.pick / single_arm.place 对齐的默认参数
# - scene_presets：用 skill_params.single_arm.pick|place 按场景覆盖
#
# 合并顺序与 motion_main / 录制一致：base 扁平化 → skill_defaults → 场景扁平 → skill_params

task_key: pick_place
label: Pick Place
use_stamped: true
robot_id: dobot_cr5_pick_place
default_scene: apple

base_task_overrides:
  max_stage_duration: 2.0
  pose_tol_pos: 0.025
  pose_tol_ori: 0.08
  require_orientation_reach: false
  use_object_orientation: false

skill_defaults:
  single_arm.pick:
    arm: left
    object_xyz_random_offset: [0.5, 0.5, 0.0]
    approach_clearance: 0.12
    grasp_clearance: -0.03
    source_object_entity_path: /World/grasp_fruits/apple/apple/apple
    grasp_orientation: [0.7, 0.7, 0.0, 0.0]
    grasp_direction: top
  single_arm.place:
    run_place_before_return: false

task_queue:
  - skill: single_arm.pregrasp
  - skill: single_arm.pick
  - skill: single_arm.place
  - skill: single_arm.return_home
  - skill: joint.movej_return_initial

scene_presets:
  apple:
    skill_params:
      single_arm.place:
        run_place_before_return: true
        place_object_entity_path: /World/grasp_fruits/shelf8
        place_pose_offset: [0.0, 0.0, 0.05]
        place_direction: left
        place_approach_clearance: -0.2
        place_orientation: [0.0, 0.7, 0.7, 0.0]
        post_release_retract_offset: [0.0, -0.2, 0.0]

  nailong:
    skill_params:
      single_arm.pick:
        source_object_entity_path: /World/nailong/PlushToy_3/material/material
        arm: left
        grasp_direction: top
        grasp_orientation: [0.4, 0.9, 0.0, 0.0]
        target_pose_offset: [0.0, 0.0, -0.035]
        approach_clearance: 0.2
        grasp_clearance: 0.0

record:
  base_record_overrides:
    task_name: pick_place
    fps: 30
    camera_info_timeout: 10.0
    enable_keypoint_pcd: false
    include_depth_feature: false
    image_writer_processes: 0
    image_writer_threads: 8
    video_encoding_batch_size: 5
  profiles:
    - key: default
      label: Default
      overrides: {}
    - key: fast
      label: Fast Encode Queue
      overrides:
        image_writer_threads: 12
        video_encoding_batch_size: 10
