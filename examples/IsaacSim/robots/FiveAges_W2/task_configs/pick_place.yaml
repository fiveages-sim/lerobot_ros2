# FiveAges W2 — 单臂抓取放置（skill_defaults / skill_params）
#
# 合并顺序与 motion_main / 录制一致：base 扁平化 → skill_defaults → 场景 → skill_params

task_key: pick_place
label: Pick Place
use_stamped: true
robot_id: fiveages_w2_pick_place
default_scene: grab_medicine

base_task_overrides:
  max_stage_duration: 2.0
  pose_tol_pos: 0.025
  pose_tol_ori: 0.08
  require_orientation_reach: false
  use_object_orientation: false

skill_defaults:
  single_arm.pick:
    arm: right
    prepare_offset: [0.0, 0.0, 0.2]
    object_prim_path: /World/medicine_handover/FinasterideTablets/tablets/tablets
    ee_base_orientation: [1.0, 0.0, 0.0, 0.0]
    grasp_direction: +z
    grasp_direction_vector: [0, 0, 1]
  single_arm.place:

task_queue:
  - skill: robot.cache_ee_pose
    params:
      key: w2_pick_prep_pose
  - skill: single_arm.pick
  - skill: single_arm.place
  - skill: single_arm.goto_cache_pose
    params:
      key: w2_pick_prep_pose

scene_presets:
  grab_medicine:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/medicine_handover/FinasterideTablets/tablets/tablets

  grab_bottle:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/ConvenienceStore01/SM_Bottle_04_85
        arm: left
        grasp_direction: +z
        ee_base_orientation: [0.7, 0.0, 0.7, 0.0]
        object_position_offset: [0.0, 0.0, 0.1]
        prepare_offset: [0.0, 0.0, 0.2]
        retreat_direction_extra: 0.0
        retreat_offset: [0.0, 0.0, 0.1]

  ptc-pick-24:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/scene/trolley/sr15_24/SR15_10
        arm: right
        grasp_direction: +z
        ee_base_orientation: [0.0, 0.91, 0.0, 0.39]
        object_position_offset: [-0.038, 0.028, 0.005]
        prepare_offset: [0.0, 0.0, 0.3]
        retreat_direction_extra: 0.0
        retreat_offset: [0.0, 0.0, 0.3]

  ptc-pick-23:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/scene/trolley/sr15_23/SR15_10
        arm: right
        grasp_direction: +z
        ee_base_orientation: [0.0, 0.91, 0.0, 0.39]
        object_position_offset: [-0.038, 0.01, 0.005]
        prepare_offset: [0.0, 0.0, 0.3]
        retreat_direction_extra: 0.0
        retreat_offset: [0.0, 0.0, 0.3]

record:
  base_record_overrides:
    task_name: pick_place
    fps: 30
    camera_info_timeout: 10.0
    enable_keypoint_pcd: false
    include_depth_feature: false
    image_writer_processes: 0
    image_writer_threads: 8
    video_encoding_batch_size: 5
  profiles:
    - key: default
      label: Default
      overrides: {}
    - key: fast
      label: Fast Encode Queue
      overrides:
        image_writer_threads: 12
        video_encoding_batch_size: 10
