# FiveAges W2 — POC 项目：双臂同时各抓一个箱子（基于并行双臂抓取）
#
# 左手抓 /World/port6/box_blue_01
# 右手抓 /World/port6/box_blue_03
# 使用 dual_arm.parallel_pick：两臂同时抓不同物体（非 carry 语义）
#
# 合并顺序：base 扁平化 → skill_defaults（与 task_queue 块顺序一致书写）→ 场景扁平 → skill_params
#
# Sim reset（motion/record 的 reset_env）不随机物体。需要时在 task_queue **第一个顺序块**加：
#   skill: env.randomize_object_local_xyz
#   params: { object_prim_path: /World/.../some_prim, xyz_offset: [0.05, 0.05, 0.0] }

task_key: poc_navigate_bimanual_2box_rev
label: "[PORT6 Rev] 导航后双臂分别搬蓝箱子"
use_stamped: true
robot_id: fiveages_w2_poc_bimanual_pick_2
default_scene: two_box

base_task_overrides:
  base_link_entity_path: /World/robot/FiveAges_W2/LinkHou_S2/base_footprint/base_link
  object_prim_path: /World/port6/box_blue_01/small_blue
  max_stage_duration: 2.0
  pose_tol_pos: 0.007
  pose_tol_ori: 0.05
  require_orientation_reach: false
  use_object_orientation: false

task_queue:
  - parallel:
      - skill: joint.movej_to_config
        id: poc_pick_start_movej
      # - skill: nav.navigate_to_object
      #   id: nav_to_pick
  - skill: dual_arm.parallel_pick
  - parallel:
      - skill: joint.movej_to_config
        id: body_up
      - skill: dual_arm.bimanual_align
        id: align_with_body_up
  - parallel:
    - skill: joint.movej_to_config
      id: lower_body_while_nav_to_port2_shelf1
    - skill: dual_arm.bimanual_align
      id: align_hands_while_lower_body
#      id: align_hands_y_while_nav
  - skill: dual_arm.place
  - parallel:
    - skill: joint.movej_to_config
      id: retreat_dual_arm
    - skill: dual_arm.bimanual_align
      id: align_with_body_retreat
  - skill: joint.movej_to_config
    id: body_turnaround
  # - skill: joint.movej_to_config
  #   id: return_to_original_pose


# 键顺序与 task_queue 中各块 id / skill 出现顺序一致（便于对照）
skill_defaults:
  # task_queue[0].parallel[0]
  poc_pick_start_movej:
    body_positions: [-1.35, -2.35, -1.45, -3.1416]
    left_arm_positions: [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true


  # task_queue[0].parallel[1]
  nav_to_pick:
    # object_prim_path: /World/scene/scene/port6/pallet2/pallet2
    object_prim_path: /World/port6/pallet2/pallet2
    approach_offset_x: -1.2
    approach_offset_y: 0.0
    yaw: 0
    timeout: 10.0

  # task_queue[1..3]
  dual_arm.parallel_pick:
    left_pick:
      object_prim_path: /World/port6/box_blue_01/small_blue
      object_position_offset: [-0.04, -0.20, 0.173]
      prepare_offset: [0.0, 0.0, -0.04]
      pick_clearance: 0.0
      # ee_base_orientation: [0.7044, -0.0616, 0.7044, -0.0616]
      ee_base_orientation: [0.0616, 0.7044, -0.0616, -0.7044]
      ee_pick_direction_vector: [0, 0, 1]
      ee_lift_offset: [0.0, 0.0, 0.1]
      ee_retreat_offset: [0.1, 0.0, 0.0]
    right_pick:
      object_prim_path: /World/port6/box_blue_03/small_blue
      object_position_offset: [-0.04, 0.20, 0.173]
      prepare_offset: [0.0, 0.0, -0.04]
      pick_clearance: 0.0
      # ee_base_orientation: [0.7044,  0.0616, 0.7044, 0.0616]
      ee_base_orientation: [-0.0616, 0.7044, 0.0616, -0.7044]
      ee_pick_direction_vector: [0, 0, 1]
      ee_lift_offset: [0.0, 0.0, 0.1]
      ee_retreat_offset: [0.1, 0.0, 0.0]



  body_up:
    body_positions: [-1.0, -2.0, -1.0, -3.1416]
    skip_fsm_change: true
    # left_arm_positions: [1.6435, -0.7961, -1.2985, -1.3593, -0.7063, -0.3655, 0.0665]
    # right_arm_positions: [-1.6435, -0.7961, 1.2985, -1.3593, 0.7063, -0.3655, -0.0665]

  # task_queue[4].parallel[1]
  align_with_body_up:
    align_position: [0.55, 0.0, -0.085]
    orientation_delta_rpy: [0.0, 0.45, 0.0]
    motion_frame_id: "arm_base"

  # task_queue[5].parallel（若开启导航子块）
  nav_to_port2_shelf1:
    object_prim_path: /World/shelf1/shelf1
    approach_offset_x:  0.9
    approach_offset_y: 0.0
    yaw: 0
    timeout: 10.0

  lower_body_while_nav_to_port2_shelf1:
    body_positions: [-1.0, -2.0, -0.88, 0]
    # left_arm_positions: [1.5235, -0.7961, -1.2985, -1.3593, -0.7063, -0.3655, 0.0665]
    # right_arm_positions: [-1.5235, -0.7961, 1.2985, -1.3593, 0.7063, -0.3655, -0.0665]
    skip_fsm_change: true
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  align_hands_while_lower_body:
    align_position: [0.55, 0.0, -0.1]
    orientation_delta_rpy: [0.0, -0.12, 0.0]
    motion_frame_id: "arm_base"

  # 相对放置：平移在 motion 系；若腰转后与 base 左右直觉不一致，设 motion_frame_id 为随腰 TF
  dual_arm.place:
    reference_object_prim_path: /World/shelf1/shelf1
    object_position_offset: [-0.25, 0.0, 0.72]
    retreat_xyz: [-0.2, 0.0, 0.0]
    motion_frame_id: "base_footprint"

  retreat_dual_arm:
    body_positions: [-1.0, -2.0, -1.0, 0]
    skip_fsm_change: true
    # left_arm_positions: [2.6737, -1.5392, -2.2112, -1.8337, -0.6037, -0.6164, -0.7073]
    # right_arm_positions: [ -2.6737, -1.5392, 2.2112, -1.8337, 0.6037, -0.6164, 0.7073]

  align_with_body_retreat:
    align_position: [0.35, 0.0, -0.18]
    orientation_delta_rpy: [0.0, 0.12, 0.0]
    motion_frame_id: "arm_base"



  body_turnaround:
    body_positions: [-1.0, -2.0, -1.0, -3.1416]
    # left_arm_positions: [2.6737, -1.5392, -2.2112, -1.8337, -0.6037, -0.6164, -0.7073]
    # right_arm_positions: [ -2.6737, -1.5392, 2.2112, -1.8337, 0.6037, -0.6164, 0.7073]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  return_to_original_pose:
    body_positions: [-0.75, -1.5, -0.75, 0.0]
    left_arm_positions: [-0.793, 1.0386, 0.9957, -1.5697, -0.6505, -0.4876, -0.4899]
    right_arm_positions: [0.793, 1.0386, -0.9957, -1.5697, 0.6505, -0.4876, 0.4899]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

scene_presets:
  two_box1:
    skill_params:
      dual_arm.parallel_pick:
        left_pick:
          object_prim_path: /World/port6/box_blue_01/small_blue
        right_pick:
          object_prim_path: /World/port6/box_blue_03/small_blue

  two_box2:
    skill_params:
      poc_pick_start_movej:
        body_positions: [-1.35, -2.35, -1.75, -3.1416]
        left_arm_positions: [-1.6262, 0.6995, 1.6420, -1.3497, -1.1576, -0.6108, -0.2785]
        right_arm_positions: [1.6262, 0.6995, -1.6420, -1.3497, 1.1576, -0.6108, 0.2785]
      dual_arm.parallel_pick:
        left_pick:
          object_prim_path: /World/port6/box_blue/small_blue
          object_position_offset: [-0.04, -0.20, 0.168]
        right_pick:
          object_prim_path: /World/port6/box_blue_02/small_blue
          object_position_offset: [-0.04, 0.20, 0.168]

      body_up:
        body_positions: [-0.6, -1.2, -0.6, -3.1416]
        skip_fsm_change: true

      align_with_body_up:
        align_position: [0.55, 0.0, -0.085]
        orientation_delta_rpy: [0.0, 0.75, 0.0]
        motion_frame_id: "arm_base"

      lower_body_while_nav_to_port2_shelf1:
        body_positions: [-0.6, -1.2, -0.6, 0]

      align_hands_while_lower_body:
        align_position: [0.55, 0.0, 0.1]
        orientation_delta_rpy: [0.0, -0.0, 0.0]
        motion_frame_id: "arm_base"

      dual_arm.place:
        object_position_offset: [-0.25, 0.0, 1.24]
        retreat_xyz: [-0.2, 0.0, 0.0]

      retreat_dual_arm:
        body_positions: [-0.6, -1.2, -0.6, 0]

      body_turnaround:
        body_positions: [-0.6, -1.2, -0.6, -3.1416]



