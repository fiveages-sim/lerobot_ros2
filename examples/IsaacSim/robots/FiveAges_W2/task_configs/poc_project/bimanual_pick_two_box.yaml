# FiveAges W2 — POC 项目：双臂同时各抓一个箱子（基于并行双臂抓取）
#
# 左手抓 /World/port6/box_blue_01
# 右手抓 /World/port6/box_blue_03
# 使用 dual_arm.parallel_pick_*：两臂同时抓不同物体（非 carry 语义）
#
# 合并顺序：base 扁平化 → skill_defaults（与 task_queue 块顺序一致书写）→ 场景扁平 → skill_params
#
# Sim reset（motion/record 的 reset_env）不随机物体。需要时在 task_queue **第一个顺序块**加：
#   skill: env.randomize_object_local_xyz
#   params: { object_entity_path: /World/.../some_prim, xyz_offset: [0.05, 0.05, 0.0] }

task_key: poc_bimanual_pick_2
label: POC — Bimanual Pick — 2
use_stamped: true
robot_id: fiveages_w2_poc_bimanual_pick_2
default_scene: two_box

base_task_overrides:
  base_link_entity_path: /World/robot/FiveAges_W2/LinkHou_S2/base_footprint/base_link
  source_object_entity_path: /World/port6/box_blue_01/small_blue
  max_stage_duration: 2.0
  pose_tol_pos: 0.01
  pose_tol_ori: 0.05
  require_orientation_reach: false
  use_object_orientation: false

task_queue:
  - parallel:
      - skill: joint.movej_to_config
        id: poc_pick_start_movej
      - skill: nav.navigate_to_object
        id: nav_to_pick
  - skill: dual_arm.parallel_pick_approach
  - skill: dual_arm.parallel_pick_grasp
  - skill: dual_arm.parallel_pick_retreat
  - parallel:
    - skill: nav.navigate_to_object
      id: nav_to_port2_shelf1
    - skill: joint.movej_to_config
      id: lower_body_while_nav_to_port2_shelf1
    - skill: dual_arm.bimanual_align_mid_y
      id: align_hands_y_while_nav
  - skill: dual_arm.place_relative
  - skill: joint.movej_to_config
    id: return_to_original_pose


# 键顺序与 task_queue 中各块 id / skill 出现顺序一致（便于对照）
skill_defaults:
  # task_queue[0].parallel[0]
  poc_pick_start_movej:
    body_positions: [-1.3, -2.3, -0.5, 0.0]
    left_arm_positions: [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  lower_body_while_nav_to_port2_shelf1:
    body_positions: [-1.04, -2.08, -1.04, 3.14]
    left_arm_positions: [-0.3354, 0.9807, 0.6176, -1.9927, -0.9576, -0.3172, -0.3674]
    right_arm_positions: [0.3328, 0.9791, -0.6175, -1.9929, 0.9609, -0.3183, 0.3663]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  return_to_original_pose:
    body_positions: [-0.8993, -1.7144, -0.8651, 0.0]
    left_arm_positions: [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true
  # task_queue[0].parallel[1]
  nav_to_pick:
    object_entity_path: /World/scene/scene/port6/pallet2/pallet2
    approach_offset_x: -1.2
    approach_offset_y: 0.0
    yaw: 0
    frame_id: map
    timeout: 10.0

  # task_queue[1..3]
  dual_arm.parallel_pick:
    left_pick:
      source_object_entity_path: /World/scene/scene/port6/box_blue_01/small_blue
      target_pose_offset: [0.04, 0.2, 0.168]
      approach_clearance: 0.04
      grasp_clearance: 0.0
      grasp_offset: [0.0, -0.008, 0.01]
      grasp_direction: top
      grasp_orientation: [0.7044, -0.0616, 0.7044, -0.0616]
      grasp_direction_vector: [0, 1, 0]
      retreat_direction_extra: 0.0
      retreat_offset: [0.0, 0.0, 0.1]   # 第4段 Lift
      retreat_xyz: [-0.2, 0.0, 0.0]   # 第5段 Retreat（从 Lift 点继续走 XYZ）
    right_pick:
      source_object_entity_path: /World/scene/scene/port6/box_blue_03/small_blue
      target_pose_offset: [0.04, -0.2, 0.168]
      approach_clearance: 0.04
      grasp_clearance: 0.0
      grasp_offset: [0.0, 0.008, 0.01]
      grasp_direction: top
      grasp_orientation: [0.7044,  0.0616, 0.7044, 0.0616]
      grasp_direction_vector: [0, -1, 0]
      retreat_direction_extra: 0.0
      retreat_offset: [0.0, 0.0, 0.1]   # 第4段 Lift
      retreat_xyz: [-0.2, 0.0, 0.0]   # 第5段 Retreat（从 Lift 点继续走 XYZ）

  nav_to_port2_shelf1:
    object_entity_path: /World/scene/scene/port2/shelf1/shelf1
    approach_offset_x:  0.9
    approach_offset_y: 0.0
    yaw: 0
    frame_id: map
    timeout: 10.0
  # parallel[2]：持箱时把左右手中点 Y 平移到 target_mid_y
  dual_arm.bimanual_align_mid_y:
    target_mid_y: 0.0
    motion_frame_id: "arm_base"

  # 相对放置：平移在 motion 系；若腰转后与 base 左右直觉不一致，设 motion_frame_id 为随腰 TF
  dual_arm.place_relative:
    translation_xyz: [0.45, 0.0, -0.08]
    motion_frame_id: "arm_base"

scene_presets:
  two_box:
    skill_params:
      dual_arm.parallel_pick:
        left_pick:
          source_object_entity_path: /World/scene/scene/port6/box_blue_01/small_blue
        right_pick:
          source_object_entity_path: /World/scene/scene/port6/box_blue_03/small_blue
