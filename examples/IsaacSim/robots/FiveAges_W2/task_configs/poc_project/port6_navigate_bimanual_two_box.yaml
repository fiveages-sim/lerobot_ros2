# FiveAges W2 — POC 项目：双臂同时各抓一个箱子（基于并行双臂抓取）
#
# 左手抓 /World/port6/box_blue_01
# 右手抓 /World/port6/box_blue_03
# 使用 dual_arm.parallel_pick：两臂同时抓不同物体（非 carry 语义）
#
# 合并顺序：base 扁平化 → skill_defaults（与 task_queue 块顺序一致书写）→ 场景扁平 → skill_params
#
# Sim reset（motion/record 的 reset_env）不随机物体。需要时在 task_queue **第一个顺序块**加：
#   skill: env.randomize_object_local_xyz
#   params: { object_prim_path: /World/.../some_prim, xyz_offset: [0.05, 0.05, 0.0] }

task_key: poc_navigate_bimanual_2box
label: "[PORT6] 导航后双臂分别搬蓝箱子"
use_stamped: true
robot_id: fiveages_w2_poc_bimanual_pick_2
default_scene: two_box

runtime_defaults:
  base_link_entity_path: /World/robot/FiveAges_W2/LinkHou_S2/base_footprint/base_link
  max_stage_duration: 2.0
  pose_tol_pos: 0.007
  pose_tol_ori: 0.05

task_queue:
  - parallel:
      - skill: joint.movej_to_config
        id: nav_gesture
      - skill: nav.navigate_to_object
        id: nav_to_pick
  - skill: joint.movej_to_config
    id: poc_pick_start_movej
  - skill: dual_arm.parallel_pick
  - parallel:
    - skill: joint.movej_to_config
      id: lower_body_while_nav_to_port2_shelf1
    - skill: dual_arm.bimanual_align
      id: align_hands_while_lower_body
    - skill: nav.navigate_to_object
      id: nav_to_port2_shelf1
  - skill: dual_arm.place
  - skill: joint.movej_to_config
    id: return_to_navigate_pose


# 键顺序与 task_queue 中各块 id / skill 出现顺序一致（便于对照）
skill_defaults:
  # nav_gesture：首段与 nav 并行的收臂导航位；末段复用 id，回到同一导航位（同 basic_demo/navigate_and_wave 的 retreat_arms_while_nav）
  nav_gesture:
    body_positions: [-1.35, -2.7, -1.35, 0.0]
    left_arm_positions: [-0.638, 1.528, 1.562, -1.680, 0.0, -0.787, 0.0]
    right_arm_positions: [0.638, 1.528, -1.562, -1.680, 0.0, -0.787, 0.0]
    arrival_timeout: 30.0
    joint_tolerance: 0.05

  # task_queue[0].parallel[1]：靠近取货点 pallet2
  nav_to_pick:
    object_prim_path: /World/scene/scene/port6/pallet2/pallet2
    approach_offset_x: -1.2
    approach_offset_y: 0.0
    timeout: 60.0

  # task_queue[1]：到位后进入双臂抓取预备关节
  poc_pick_start_movej:
    body_positions: [-1.35, -2.35, -1.45, 0.0]
    left_arm_positions: [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  # task_queue[2]
  dual_arm.parallel_pick:
    left_pick:
      object_prim_path: /World/scene/scene/port6/box_blue_01/small_blue
      object_position_offset: [0.2, -0.04, 0.173]
      prepare_offset: [0.0, -0.04, 0.0]
      pick_clearance: 0.0
      ee_base_orientation: [0.0616, 0.7044, -0.0616, -0.7044]
      ee_retreat_offset: [0.09848, -0.01736, -0.1]
    right_pick:
      object_prim_path: /World/scene/scene/port6/box_blue_03/small_blue
      object_position_offset: [-0.2, -0.04, 0.173]
      prepare_offset: [0.0, 0.04, 0.0]
      pick_clearance: 0.0
      ee_base_orientation: [-0.0616, 0.7044, 0.0616, -0.7044]
      ee_retreat_offset: [0.09848, 0.01736, -0.1]

  # task_queue[3].parallel[0]（腰高与 port6_bimanual_two_box_rev 的 body_up 一致）
  lower_body_while_nav_to_port2_shelf1:
    body_positions: [-1.0, -2.0, -0.88, 0.0]
    skip_fsm_change: true
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  # task_queue[3].parallel[1]
  align_hands_while_lower_body:
    align_position: [0.55, 0.0, -0.15]
    orientation_delta_rpy: [0.0, 0.33, 0.0]
    motion_frame_id: "arm_base"

  # task_queue[3].parallel[2]
  nav_to_port2_shelf1:
    object_prim_path: /World/scene/scene/port2/shelf1/shelf1
    approach_offset_x:  1.2
    approach_offset_y: 0.0
    timeout: 20.0

  dual_arm.place:
    reference_object_prim_path: /World/scene/scene/port2/shelf1/shelf1
    object_position_offset: [0.0, 0.25, 0.72]
    motion_frame_id: "arm_base"
    arm_movel_duration: 2.0
    retreat_xyz: [-0.3, 0.0, -0.1]

  retreat_dual_arm:
    body_positions: [-1.0, -2.0, -1.0, 0]
    skip_fsm_change: true

  align_with_body_retreat:
    align_position: [0.35, 0.0, -0.18]
    orientation_delta_rpy: [0.0, 0.12, 0.0]
    motion_frame_id: "arm_base"

scene_presets:
  two_box1: {}

  two_box2:
    skill_params:
      poc_pick_start_movej:
        body_positions: [-1.35, -2.35, -1.75, 0.0]
      dual_arm.parallel_pick:
        left_pick:
          object_prim_path: /World/scene/scene/port6/box_blue/small_blue
        right_pick:
          object_prim_path: /World/scene/scene/port6/box_blue_02/small_blue
      dual_arm.place:
        object_position_offset: [0.0, 0.25, 1.24]
        retreat_xyz: [-0.3, 0.0, -0.2]

      lower_body_while_nav_to_port2_shelf1:
        body_positions: [-0.6, -1.2, -0.6, 0]

      align_hands_while_lower_body:
        align_position: [0.55, 0.0, 0.0]
        orientation_delta_rpy: [0.0, 0.75, 0.0]
        motion_frame_id: "arm_base"

      retreat_dual_arm:
        body_positions: [-0.6, -1.2, -0.6, 0]



