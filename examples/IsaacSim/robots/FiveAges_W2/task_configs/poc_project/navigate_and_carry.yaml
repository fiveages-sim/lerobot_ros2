# FiveAges W2 — POC 项目：导航后双臂搬箱（基于 bimanual_carry 扩展）
#
# 合并顺序：base 扁平化 → skill_defaults（与 task_queue 块顺序一致书写）→ 场景扁平 → skill_params
#
# Sim reset（motion/record 的 reset_env）不随机物体。需要时在 task_queue **第一个顺序块**加：
#   skill: env.randomize_object_local_xyz
#   params: { object_entity_path: /World/.../some_prim, xyz_offset: [0.05, 0.05, 0.0] }

task_key: poc_navigate_and_carry
label: POC — Navigate and Bimanual Carry
use_stamped: true
robot_id: fiveages_w2_poc_navigate_and_carry
default_scene: box01

base_task_overrides:
  base_link_entity_path: /World/robot/FiveAges_W2/LinkHou_S2/base_footprint/base_link
  max_stage_duration: 2.0
  pose_tol_pos: 0.005
  pose_tol_ori: 0.05
  require_orientation_reach: false
  use_object_orientation: false

task_queue:
  - parallel:
      - skill: joint.movej_to_config
        id: navigate_gesture
      - skill: nav.navigate_to_object
        id: nav_to_carry
  - skill: joint.movej_to_config
    id: pre_ocs2_carry_pose
  - skill: dual_arm.carry_approach
  - skill: dual_arm.carry_grasp
  - skill: dual_arm.carry_lift_retreat
  - parallel:
      - skill: nav.navigate_to_object
        id: nav_to_shelf2
      - skill: joint.movej_to_config
        id: lower_body_while_nav_to_shelf2
      - skill: dual_arm.bimanual_align_mid_y
        id: align_hands_y_while_nav
  # 到达 shelf2 后：相对当前持箱末端平移 → 放下 → 松爪 → 外张后撤（不依赖货架 prim）
  - skill: dual_arm.place_relative

# 键顺序与 task_queue 中各块 id / skill 出现顺序一致（便于对照）
skill_defaults:
  # parallel[0]：与 nav_to_carry 并行 — 全身预备（与 bimanual_carry 起手位一致）
  navigate_gesture:
    body_positions:      [-1.3, -2.6, -1.3, 0.0]
    left_arm_positions:  [-0.638, 1.528, 1.562, -1.680, 0.0, -0.787, 0.0]
    right_arm_positions: [0.638, 1.528, -1.562, -1.680, 0.0, -0.787, 0.0]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
  # parallel[1]
  nav_to_carry:
    object_entity_path: /World/scene/scene/port7/pallet2/pallet2
    approach_offset_x: -1.2
    approach_offset_y: 0.0
    yaw: 0
    frame_id: map
    timeout: 60.0

  pre_ocs2_carry_pose:
    body_positions: [-1.3, -2.3, -1.0, 0.0]
    left_arm_positions: [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  dual_arm.carry:
    source_object_entity_path: /World/scene/scene/port7/box_black_03/black_box
    carry_half_span_y: 0.368
    carry_prepare_offset: [-0.2, 0.0, 0.0]
    carry_approach_clearance_y: 0.04
    carry_xyz: [0.04, 0.0, 0.05]
    carry_left_orientation: [0.7, 0.0, 0.7, 0.0]
    carry_right_orientation: [0.7, 0.0, 0.7, 0.0]
    carry_lift_xyz: [-0.2, 0.0, 0.1]

  # 第二段 parallel[0]
  nav_to_shelf2:
    object_entity_path: /World/scene/scene/port3/shelf2/shelf2
    approach_offset_x: 1.32
    approach_offset_y: 0.0
    yaw: 0
    frame_id: map
    timeout: 20.0
  # parallel[1]
  lower_body_while_nav_to_shelf2:
    body_positions: [-1.35, -2.4, -1.05, 3.14]
    skip_fsm_hold: true
    arrival_timeout: 90.0
    joint_tolerance: 0.05
  # parallel[2]：持箱时把左右手中点 Y 平移到 target_mid_y
  dual_arm.bimanual_align_mid_y:
    target_mid_y: 0.0
    motion_frame_id: "arm_base"

  # 相对放置：平移在 motion 系；若腰转后与 base 左右直觉不一致，设 motion_frame_id 为随腰 TF
  dual_arm.place_relative:
    translation_xyz: [0.25, 0.0, -0.08]
    motion_frame_id: "arm_base"

scene_presets:
  box03:
    skill_params:
      dual_arm.carry:
        source_object_entity_path: /World/scene/scene/port7/box_black_03/black_box
  box02:
    skill_params:
      pre_ocs2_carry_pose:
        body_positions: [-1.2, -2.4, -1.05, 0.0]
      dual_arm.carry:
        source_object_entity_path: /World/scene/scene/port7/box_black_02/black_box
      dual_arm.bimanual_align_mid_y:
        orientation_delta_rpy: [0.0, 0.15, 0.0]
      dual_arm.place_relative:
        translation_xyz: [ 0.33, 0.0, -0.025 ]
