# FiveAges W2 — POC 项目：双臂搬箱（无 cache / goto_cache；搬运结束即停）
#
# 合并顺序：base 扁平化 → skill_defaults（single_arm.pick/place + dual_arm.carry）→ 场景扁平 → skill_params

task_key: poc_port7_rev_bimanual_carry
label: "[PORT7 Rev] Bimanual Carry"
use_stamped: true
robot_id: fiveages_w2_poc_bimanual_carry
default_scene: box01

base_task_overrides:
  base_link_entity_path: /World/robot/FiveAges_W2/LinkHou_S2/base_footprint/base_link
  max_stage_duration: 2.0
  pose_tol_pos: 0.005
  pose_tol_ori: 0.05
  require_orientation_reach: false
  use_object_orientation: false

skill_defaults:
  # 与 navigate_and_carry.yaml 中 navigate_gesture 一致：搬运前先全身到位
  poc_carry_start_movej:
    body_positions: [-1.35, -2.0, -0.65, 3.14]
    left_arm_positions: [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    body_movej_duration: 2.0
    # 与 navigate_and_carry 中 pre_ocs2_carry_arms 一致：关节到位后再 HOLD→OCS2，后续 carry 笛卡尔段才能跟得上
    resume_ocs2: true

  dual_arm.carry:
    motion_frame_id: "arm_base"
    arm_movel_duration: 2.0

    source_object_entity_path: /World/port7/box_black_03/black_box
    object_position_offset: [-0.04, 0.0, 0.05]

    object_dual_arm_half_span_y: 0.368
    arm_merge_distance_y: 0.04
    left_base_orientation: [0.7, 0.0, 0.7, 0.0]
    right_base_orientation: [0.7, 0.0, 0.7, 0.0]

    ee_lift_offset: [0.1, 0.0, -0.2]

  lower_body_while_nav_to_shelf2:
    body_positions: [-1.35, -2.0, -0.65, 0.0]
    skip_fsm_change: true
    arrival_timeout: 90.0
    joint_tolerance: 0.05

  dual_arm.bimanual_align:
    target_mid_y: 0.0
    align_position: [0.55, 0.0, -0.085]
    motion_frame_id: "arm_base"

  dual_arm.place_relative:
    reference_object_entity_path: /World/shelf2/shelf2
    reference_offset_xyz: [-0.6, 0.0, 0.85]
    motion_frame_id: "arm_base"
    arm_movel_duration: 2.0

  # 末尾回到导航姿态（与 navigate_and_carry 的 navigate_gesture 一致）
  return_to_navigate_pose:
    body_positions: [-1.3, -2.6, -1.3, 3.14]
    left_arm_positions: [-0.638, 1.528, 1.562, -1.680, 0.0, -0.787, 0.0]
    right_arm_positions: [0.638, 1.528, -1.562, -1.680, 0.0, -0.787, 0.0]
    arrival_timeout: 30.0
    joint_tolerance: 0.05

task_queue:
  - skill: joint.movej_to_config
    id: poc_carry_start_movej
  - skill: dual_arm.carry_approach
  - skill: dual_arm.carry_grasp
  - skill: dual_arm.carry_lift_retreat
  - parallel:
      - skill: joint.movej_to_config
        id: lower_body_while_nav_to_shelf2
      - skill: dual_arm.bimanual_align
  - skill: dual_arm.place_relative
  - skill: joint.movej_to_config
    id: return_to_navigate_pose

scene_presets:
  box01:
    skill_params:
      dual_arm.carry:
        source_object_entity_path: /World/port7/box_black_01/black_box
  box02:
    skill_params:
      poc_carry_start_movej:
        body_positions: [-1.35, -2.0, -1.00, 3.14]
      dual_arm.carry:
        source_object_entity_path: /World/port7/box_black_02/black_box
        orientation_delta_rpy: [0.0, -0.35, 0.0]
      dual_arm.bimanual_align:
        orientation_delta_rpy: [0.0, 0.35, 0.0]

  box03:
    skill_params:
      poc_carry_start_movej:
        body_positions: [ -1.35, -2.0, -1.3, 3.14 ]
        body_movej_duration: 2.0
      dual_arm.carry:
        source_object_entity_path: /World/port7/box_black_03/black_box
        orientation_delta_rpy: [0.0, -0.65, 0.0]
        ee_lift_offset: [0.1, 0.0, -0.1]
      lower_body_while_nav_to_shelf2:
        body_positions: [ -0.1, 0.2, 0.3, 0.0 ]
        body_movej_duration: 4.0
      dual_arm.bimanual_align:
        orientation_delta_rpy: [ 0.0, 0.65, 0.0 ]
        arm_movel_duration: 4.0
      dual_arm.place_relative:
        reference_offset_xyz: [-0.57, 0.0, 1.27]

  box04:
    skill_params:
      poc_carry_start_movej:
        body_positions: [ -1.35, -2.0, -1.7, 3.14 ]
        body_movej_duration: 2.0
      dual_arm.carry:
        source_object_entity_path: /World/port7/box_black_04/black_box
        orientation_delta_rpy: [0.0, -1.05, 0.0]
        ee_lift_offset: [0.1, 0.0, 0.0]
      lower_body_while_nav_to_shelf2:
        body_positions: [ -0.1, 0.2, 0.3, 0.0 ]
        body_movej_duration: 4.0
      dual_arm.bimanual_align:
        orientation_delta_rpy: [ 0.0, 1.05, 0.0 ]
        arm_movel_duration: 4.0
      dual_arm.place_relative:
        reference_offset_xyz: [-0.57, 0.0, 1.27]
