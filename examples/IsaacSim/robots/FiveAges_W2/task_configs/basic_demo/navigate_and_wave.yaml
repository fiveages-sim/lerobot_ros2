# FiveAges W2 — 导航到箱体附近后双臂搬运（navigate_and_pick + bimanual_carry 拼合）
#
# 合并顺序：base → single_arm.pick（供 nav 默认物体路径）→ dual_arm.carry → 场景 skill_params
# 队列：并行「导航 + navigate_gesture」→ pre_ocs2_* → carry →
#   navigate_backup(0.5m) → 并行「send_nav_goal(0,0) + 降腰 MoveJ」→ wait_nav_arrived → 双臂回队列起势位姿

task_key: navigate_and_wave
label: Navigate and Wave Hand
use_stamped: true
robot_id: fiveages_w2_navigate_and_wave
default_scene: default

base_task_overrides:
  max_stage_duration: 2.0
  pose_tol_pos: 0.05
  pose_tol_ori: 0.08
  require_orientation_reach: false
  use_object_orientation: false
  base_link_entity_path: /World/robot/FiveAges_W2/LinkHou_S2/base_footprint/base_link

task_queue:
  - skill: nav.navigate_to_pose
    id: nav_to_wave_pose
  - skill: joint.movej_to_config
    id: movej_to_initial_pose
  - skill: robot.cache_joint_state
    id: cache_init_arm_joint
  - skill: joint.movej_to_config
    id: movej_to_wave
  - skill: joint.goto_cached_joints
    id: goto_initial_pose

skill_defaults:
  nav_to_wave_pose:
    x: 4.0
    y: 3.0
    yaw: 3.14

  movej_to_initial_pose:
    body_positions: [-0.19, -0.38, -0.19, -0.35]
    left_arm_positions: [1.51, -0.73, 0.50, -1.9, 0.08, 0.19, -0.11]
    right_arm_positions: [0.81, -0.004, 0.6, -1.7, -0.08, -0.05, -0.02]

  cache_init_arm_joint:
    key: init_arm_joints
    include_body: false

  movej_to_wave:
    body_positions: [-0.19, -0.38, -0.19, -0.35]
    left_arm_positions: [1.51, -0.73, 0.50, -1.9, 0.08, 0.19, -0.11]
    right_arm_positions: [0.81, -0.004, 0.6, -2.2, -0.08, -0.05, -0.02]

  goto_initial_pose:
    key: init_arm_joints


scene_presets:
  default: {}

