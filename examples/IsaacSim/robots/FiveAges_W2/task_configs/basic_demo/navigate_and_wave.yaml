# FiveAges W2 — 导航到指定位置后挥手
#
# 队列：并行「导航 + 收臂 MoveJ」→ MoveJ 到初始姿态 → 缓存关节角 → MoveJ 到挥手姿态 → 回初始姿态 → single_arm.move_to_pose（右臂）

task_key: navigate_and_wave
label: Navigate and Wave Hand
use_stamped: true
robot_id: fiveages_w2_navigate_and_wave
default_scene: default

runtime_defaults:
  max_stage_duration: 2.0
  pose_tol_pos: 0.05
  pose_tol_ori: 0.08
  base_link_entity_path: /World/robot/FiveAges_W2/LinkHou_S2/base_footprint/base_link

task_queue:
  - parallel:
    - skill: nav.navigate_to_pose
      id: nav_to_wave_pose
    - skill: joint.movej_to_config
      id: retreat_arms_while_nav
  - skill: joint.movej_to_config
    id: movej_to_initial_pose
  - skill: robot.cache_joint_state
    id: cache_init_arm_joint
  - skill: joint.movej_to_config
    id: movej_to_wave
  - skill: joint.goto_cached_joints
    id: goto_initial_pose
  - skill: single_arm.move_to_pose
    id: send_left_pose_in_frame

skill_defaults:
  nav_to_wave_pose:
    x: 4.0
    y: 3.0
    yaw: 3.14

  retreat_arms_while_nav:
    body_positions: [-1.35, -2.7, -1.35, -0.0]
    left_arm_positions: [2.4, -1.48, -1.6, -1.6, -0.12, -0.75, -0.04]
    right_arm_positions: [-2.4, -1.48, 1.6, -1.6, 0.12, -0.75, 0.04]

  movej_to_initial_pose:
    body_positions: [-0.3, -0.6, -0.3, -0.35]
    left_arm_positions: [-1.15, 1.16, 1.86, -0.84, -0.003, -0.2575, -0.196]
    right_arm_positions: [0.81, -0.004, 0.6, -1.7, -0.08, -0.05, -0.02]

  cache_init_arm_joint:
    key: init_arm_joints
    include_body: false

  movej_to_wave:
    body_positions: [-0.19, -0.38, -0.19, -0.35]
    left_arm_positions: [-1.15, 1.16, 1.86, -0.84, -0.003, -0.2575, -0.196]
    right_arm_positions: [0.81, -0.004, 0.6, -2.2, -0.08, -0.05, -0.02]

  goto_initial_pose:
    key: init_arm_joints
    resume_ocs2: true

  send_left_pose_in_frame:
    arm: right
    motion_frame_id: arm_base
    position: [0.87, -0.11, 0.085]
    orientation: [0.387, 0.631, 0.518, 0.427]


scene_presets:
  default: {}

