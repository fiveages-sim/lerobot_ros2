# FiveAges W2 — 导航到箱体附近后双臂搬运（navigate_and_pick + bimanual_carry 拼合）
#
# 合并顺序：base → single_arm.pick（供 nav 默认物体路径）→ dual_arm.carry → 场景 skill_params
# 队列：并行「导航 + navigate_gesture」→ pre_ocs2_* → carry →
#   navigate_backup(0.5m) → 并行「send_nav_goal(0,0) + 降腰 MoveJ」→ wait_nav_arrived → 双臂回队列起势位姿

task_key: navigate_and_carry
label: Navigate and Bimanual Carry
use_stamped: true
default_scene: box01

runtime_defaults:
  max_stage_duration: 2.0
  pose_tol_pos: 0.025
  pose_tol_ori: 0.08

task_queue:
  - parallel:
      - skill: nav.navigate_to_object
        id: nav_to_carry
      - skill: joint.movej_to_config
        id: navigate_gesture
  - skill: joint.movej_to_config
    id: pre_ocs2_carry_arms
  - skill: dual_arm.carry
  - skill: nav.navigate_relative
    id: pre_shelf_backup
  - parallel:
      - skill: nav.navigate_to_object
        id: nav_to_shelf2
      - skill: joint.movej_to_config
        id: lower_body_while_nav_to_shelf2
      - skill: dual_arm.bimanual_align
  - skill: joint.movej_to_config
    id: pre_place_body_only
  - skill: dual_arm.place
  - parallel:
      - skill: nav.navigate_relative
        id: post_carry_backup
      - skill: joint.movej_to_config
        id: post_place_navigate_gesture

skill_defaults:
  nav_to_carry:
    object_prim_path: /World/lift_box/LogisticBox_01/box/box
    approach_offset_x: 0.95
    approach_offset_y: 0.02
    yaw: 3.14
    frame_id: map
    timeout: 60.0

  # 导航并行段：双臂目标弧度（左 7 / 右 7）；躯干仍为预备弯腰位
  navigate_gesture:
    body_positions:      [-1.3, -2.6, -1.3, 0.0]
    left_arm_positions:  [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 30.0
    joint_tolerance: 0.05

  # 导航结束后：躯干+双臂一次到位并切 OCS2（双臂笛卡尔前）
  pre_ocs2_carry_arms:
    body_positions: [-0.0035, 0.0073, 0.0027, 0.0]
    left_arm_positions: [ 0.0138, 0.3641, 0.1272, -2.0973, -1.5775, 0.021, 0.0002 ]
    right_arm_positions: [ -0.0126, 0.3851, -0.1182, -2.0973, 1.585, -0.0087, 0.0 ]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  dual_arm.carry:
    object_prim_path: /World/lift_box/LogisticBox_01/box/box
    object_dual_arm_half_span_y: 0.29
    carry_prepare_offset: [ 0.0, 0.00, 0.03]
    arm_merge_distance_y: 0.08
    object_position_offset: [ 0.0, 0.0, 0.15]
    left_base_orientation: [ -0.5, 0.5, -0.5, 0.5 ]
    right_base_orientation: [ -0.5, 0.5, -0.5, 0.5 ]
    ee_lift_offset: [ 0.0, -0.15, 0.0 ]
    ee_retreat_offset: [ 0.0, 0.0, -0.2 ]

  pre_shelf_backup:
    relative_position: [-0.5, 0.0, 0.0]
    frame_id: map
    timeout: 5.0

  nav_to_shelf2:
    object_prim_path: /World/lift_box/warehouse_multiple_shelves/Shelf_2/SM_RackShelf_162/SM_RackShelf_01/Section1
    approach_offset_x: -0.95
    approach_offset_y: 1.0
    yaw: 0.0
    frame_id: map
    timeout: 40.0

  lower_body_while_nav_to_shelf2:
    body_positions: [-0.0035, 0.0073, 0.0027, 0.0]
    skip_fsm_change: true
    arrival_timeout: 90.0
    joint_tolerance: 0.05

  dual_arm.bimanual_align:
    align_position: [ 0.55, 0.0, 0.0 ]
    motion_frame_id: "arm_base"

  pre_place_body_only:
    body_positions: [-0.0035, 0.0073, 0.0027, 0.0]
    skip_fsm_change: true
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

  dual_arm.place:
    reference_object_prim_path: /World/lift_box/warehouse_multiple_shelves/Shelf_2/SM_RackShelf_162/SM_RackShelf_01/Section1
    object_position_offset: [-1.0, -0.2, 0.135]
    motion_frame_id: "arm_base"
    retreat_xyz: [-0.3, 0.0, -0.1]

  post_carry_backup:
    relative_position: [-0.5, 0.0, 0.0]
    frame_id: map
    timeout: 5.0

  post_place_navigate_gesture:
    body_positions:      [-1.3, -2.6, -1.3, 0.0]
    left_arm_positions:  [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 30.0
    joint_tolerance: 0.05

scene_presets:
  box01:
    skill_params:
      dual_arm.carry:
        object_prim_path: /World/lift_box/LogisticBox_01/box/box


record:
  base_record_overrides:
    task_name: navigate_and_carry
    fps: 30
    camera_info_timeout: 10.0
    enable_keypoint_pcd: false
    include_depth_feature: false
    image_writer_processes: 0
    image_writer_threads: 8
    video_encoding_batch_size: 5
  profiles:
    - key: default
      label: Default
      overrides: {}
