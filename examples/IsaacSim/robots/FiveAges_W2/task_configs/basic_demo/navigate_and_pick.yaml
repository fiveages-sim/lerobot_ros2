# FiveAges W2 — 导航抓取、导航放置完整流程
#
# 三层参数结构：
#   task_queue     → 定义执行顺序（id 字段区分同名 skill 的不同实例）
#   skill_defaults → 各 skill / id 的基准参数；抓取/放置与导航一致，使用
#                    single_arm.pick / single_arm.place（与 task_queue 里 skill 名对齐）
#   scene_presets  → 按场景覆盖：可用 skill_params.single_arm.pick|place，或其它 id 的 skill_params
#
# 合并优先级：runtime_defaults（仅流程级字段）
#   → skill_defaults（含 single_arm.pick / place）→ scene 扁平字段
#   → scene.skill_params → task_queue 内联 params

task_key: navigate_and_pick
label: 导航并放置抓取
use_stamped: true
robot_id: fiveages_w2_navigate_and_pick
default_scene: apple_1

runtime_defaults:
  max_stage_duration: 2.0
  pose_tol_pos: 0.025
  pose_tol_ori: 0.08

task_queue:
  - parallel:
      - skill: nav.navigate_to_object
        id: nav_to_pick
      - skill: joint.movej_to_config  
        id: navigate_gesture
  - skill: joint.movej_to_config  
    id: right_arm_pregrasp
  - skill: single_arm.pick
  - skill: nav.navigate_relative
    id: nav_back_after_pick
  - parallel:
      - skill: nav.navigate_to_object
        id: nav_to_place
      - skill: joint.movej_to_config  
        id: navigate_gesture
  - skill: joint.movej_to_config 
    id: pre_release_gesture
  - skill: single_arm.place
  - skill: joint.movej_to_config
    id: turn_waist_keep_height
  - skill: joint.movej_to_config
    id: navigate_gesture


skill_defaults:
  nav_to_pick:
    object_prim_path: /World/grasp_fruits/fruits_01/apple/apple/apple
    approach_offset_x: 0.9
    approach_offset_y: -0.4
    yaw: 3.14
    timeout: 60.0

  navigate_gesture:
    body_positions: [-1.3, -2.6, -1.3, 0.0]
    left_arm_positions: [-0.638, 1.528, 1.562, -1.680, 0.0, -0.787, 0.0]
    right_arm_positions: [0.638, 1.528, -1.562, -1.680, 0.0, -0.787, 0.0]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    body_movej_duration: 4.0

  # 导航到位后，右臂精确运动到抓取预备关节位，完成后切回 OCS2 供 pick 使用
  right_arm_pregrasp:
    body_positions:      [0.0, 0.0, 0.0, 0.0]
    right_arm_positions: [-0.0465, 1.612, -0.1924, -2.21, 1.5109, -0.216, 0.9134]
    arrival_timeout: 15.0
    joint_tolerance: 0.05
    resume_ocs2: true   # 最后一个关节步骤，之后直接 pick（笛卡尔），必须切回 OCS2
    body_movej_duration: 4.0


  single_arm.pick:
    arm: right
    prepare_offset: [0.1, 0.0, -0.1]
    object_prim_path: /World/grasp_fruits/fruits_01/apple/apple/apple
    ee_base_orientation: [0.7, 0.0, 0.7, 0.0]
    ee_retreat_offset: [0.1, 0.0, -0.2]
    motion_frame_id: "arm_base"

  nav_back_after_pick:
    relative_position: [-0.5, 0.0, 0.0]
    timeout: 60.0
    poll_period: 0.1

  nav_to_place:
    object_prim_path: /World/grasp_fruits/warehouse_multiple_shelves/Shelf_1/SM_CratePlastic_A_01/SM_CratePlastic_A_01
    approach_offset_x: -1.0
    approach_offset_y: 0.4
    yaw: 0.0
    timeout: 60.0
  
  pre_release_gesture:
    body_positions:      [0.0, 0.0, 0.0, 0.0]
    right_arm_positions: [-0.0465, 1.612, -0.1924, -2.21, 1.5109, -0.216, 0.9134]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true 

  turn_waist_keep_height:
    body_positions: [0.0, 0.0, 0.0, 1.0]
    arrival_timeout: 15.0
    joint_tolerance: 0.05
    body_movej_duration: 2.0

  single_arm.place:
    object_prim_path: /World/grasp_fruits/warehouse_multiple_shelves/Shelf_1/SM_CratePlastic_A_01/SM_CratePlastic_A_01
    ee_base_orientation: [0.7, 0.0, 0.7, 0.0]   # 放置时末端姿态（front 方向）
    prepare_offset: [0.0, 0.0, -0.2]   # 放置预接近偏移（工具系）
    object_position_offset: [-0.18, 0.0, 0.3]   # 放置目标的空间偏移（物体局部坐标系）
    ee_retreat_offset: [0.0, 0.3, -0.3]  # 松夹后撤退

scene_presets:
  apple_1:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/grasp_fruits/fruits_01/apple/apple/apple

  apple_2:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/grasp_fruits/fruits_02/apple/apple/apple
        ee_retreat_offset: [0.0, 0.2, -0.2]
      right_arm_pregrasp:
        body_positions: [-1.35, -2.3, -1.7, 3.1415]
        right_arm_positions: [0.3993, -0.7665, -0.8425, -1.7351, 2.7821, 0.0, 0.0]
      nav_back_after_pick:
        relative_position: [0.5, 0.0, 0.0]
      nav_to_pick:
        object_prim_path: /World/grasp_fruits/fruits_02/apple/apple/apple
        approach_offset_x: -0.7
        approach_offset_y: 0.2
        yaw: 3.14

record:
  base_record_overrides:
    task_name: navigate_and_pick_apple
    fps: 30
    camera_info_timeout: 10.0
    enable_keypoint_pcd: false
    include_depth_feature: false
    image_writer_processes: 0
    image_writer_threads: 8
    video_encoding_batch_size: 5
  profiles:
    - key: default
      label: Default
      overrides: {}
