# FiveAges W2 — 双臂搬箱（skill_defaults / skill_params 与 dual_arm.carry* 对齐）
#
# 合并顺序：base 扁平化 → skill_defaults（single_arm.pick/place + dual_arm.carry）→ 场景扁平 → skill_params
# 搬运队列：cache（起势）→ dual_arm.carry → goto_cache

task_key: bimanual_carry
label: Bimanual Carry
use_stamped: true
robot_id: fiveages_w2_bimanual_carry
default_scene: box01

base_task_overrides:
  max_stage_duration: 2.0
  pose_tol_pos: 0.025
  pose_tol_ori: 0.08
  require_orientation_reach: false
  use_object_orientation: false

skill_defaults:
  dual_arm.carry:
    object_prim_path: /World/lift_box/LogisticBox_01/box/box
    object_dual_arm_half_span_y: 0.29

    carry_prepare_offset: [0.0, 0.0, 0.03]
    arm_merge_distance_y: 0.08
    object_position_offset: [0.0, 0.0, 0.15]
    left_base_orientation: [-0.5, 0.5, -0.5, 0.5]
    right_base_orientation: [-0.5, 0.5, -0.5, 0.5]
    ee_lift_offset: [0.0, -0.1, 0.0]

    ee_retreat_offset: [ 0.0, 0.0,-0.2]

  carry_start_movej:
    body_positions: [-0.7057, -1.7579, -1.0379, 0.0]
    left_arm_positions: [0.0138, 0.3641, 0.1272, -2.0973, -1.5775, 0.021, 0.0002]
    right_arm_positions: [-0.0126, 0.3851, -0.1182, -2.0973, 1.585, -0.0087, 0.0]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    resume_ocs2: true

task_queue:
  - skill: joint.movej_to_config
    id: carry_start_movej
  - skill: dual_arm.carry

scene_presets:
  box01:
    skill_params:
      dual_arm.carry:
        object_prim_path: /World/lift_box/LogisticBox_01/box/box
  warehouse_box01:
    skill_params:
      dual_arm.carry:
        object_prim_path: /World/lift_box_warehouse/LogisticBox_01/box/box
        carry_prepare_offset: [0.0, 0.0, 0.03]
        object_position_offset: [-0.01, 0.0, 0.15]

