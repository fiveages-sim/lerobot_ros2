# FiveAges W2 — Orlando 项目：双臂搬箱（无 cache / goto_cache；搬运结束即停）
#
# 合并顺序：base 扁平化 → skill_defaults（single_arm.pick/place + dual_arm.carry）→ 场景扁平 → skill_params

task_key: orlando_port1_bimanual_carry
label: "[PORT1] 双臂搬灰箱子"
use_stamped: true
robot_id: fiveages_w2_poc_bimanual_carry
default_scene: box01

base_task_overrides:
  base_link_entity_path: /World/robot/FiveAges_W2/LinkHou_S2/base_footprint/base_link
  max_stage_duration: 8.0
  pose_tol_pos: 0.018
  pose_tol_ori: 0.05
  require_orientation_reach: false
  use_object_orientation: false

skill_defaults:
  # 单手抓取：与 dual_arm.carry 同一只箱子；几何在 motion_frame_id（arm_base）下解释
  single_arm.pick:
    arm: left
    object_prim_path: /World/middle_shelf/middle_shelf/Shelf_01/Level_03/box_01/box
    object_position_offset: [0.25, -0.245, 0.0]
    ee_base_orientation: [0.5, 0.5, -0.5, 0.5]
    # Close-in 仍沿工具 +Z（pick_clearance）；「沿 −X 抓」靠 ee_base_orientation 把工具轴对齐 motion_frame_id。
    # ee_pick_axis：抽离方向在 motion_frame_id 下的标签（同 cartesian_stages 的 −x）；要明显后撤可加 ee_lift_offset / ee_retreat_offset（工具系）。
    ee_pick_axis: "+x"
    motion_frame_id: arm_base
    pick_clearance: 0.0
    arm_movel_duration: 3.0
    # 预接近点：在工具系 −X 方向退 0.1 m（工具系，由 ee_base_orientation 旋到执行系）
    prepare_offset: [0.0, -0.1, 0.0]
    # 抓紧后沿工具系 −X 方向拉出 0.1 m
    ee_lift_offset: [0.0, -0.2, 0.0]
    ee_retreat_offset: [0.0, -0.2, 0.0]

  # # 抓取前先到与目标 TCP 一致的位姿，减小首段 Cartesian 的姿态插补扭角
  # pre_pick_tcp_waypoint:
  #   arm: left
  #   motion_frame_id: arm_base
  #   position: [0.56, 0.0, -0.1]
  #   orientation: [0.5, 0.5, -0.5, 0.5]

  # 与 navigate_and_carry.yaml 中 navigate_gesture 一致：搬运前先全身到位
  poc_carry_start_movej:
    body_positions: [-1.3, -2.3, -1.0, 0.0]
    left_arm_positions: [-0.55, 1.0266, 0.8165, -1.8487, -0.9908, -0.5437, -0.4515]
    right_arm_positions: [0.55, 1.0266, -0.8165, -1.8487, 0.9908, -0.5437, 0.4515]
    arrival_timeout: 10.0
    joint_tolerance: 0.05
    body_movej_duration: 2.0
    # 与 navigate_and_carry 中 pre_ocs2_carry_arms 一致：关节到位后再 HOLD→OCS2，后续 carry 笛卡尔段才能跟得上
    resume_ocs2: true

  dual_arm.carry:
    motion_frame_id: "arm_base"
    arm_movel_duration: 2.0

    object_prim_path: /World/middle_shelf/middle_shelf/Shelf_01/Level_03/box_03/box
    object_position_offset: [0.01, 0.0, 0.225]

    object_dual_arm_half_span_y: 0.195
    arm_merge_distance_y: 0.04
    left_base_orientation: [0.7, 0.0, 0.7, 0.0]
    right_base_orientation: [0.7, 0.0, 0.7, 0.0]

    ee_lift_offset: [0.1, 0.0, -0.2]

  lower_body_while_nav_to_shelf2:
    body_positions: [-1.35, -2.4, -1.05, 3.14]
    skip_fsm_change: true
    arrival_timeout: 20.0
    joint_tolerance: 0.05

  dual_arm.bimanual_align:
    align_position: [0.55, 0.0, -0.085]
    motion_frame_id: "arm_base"

  dual_arm.place:
    reference_object_prim_path: /World/shelf2/shelf2
    object_position_offset: [0.2, 0.0, 1.32]
    motion_frame_id: "arm_base"
    arm_movel_duration: 2.0

  # 末尾回到导航姿态（与 navigate_and_carry 的 navigate_gesture 一致）
  return_to_navigate_pose:
    body_positions: [-1.3, -2.6, -1.3, 0.0]
    left_arm_positions: [-0.638, 1.528, 1.562, -1.680, 0.0, -0.787, 0.0]
    right_arm_positions: [0.638, 1.528, -1.562, -1.680, 0.0, -0.787, 0.0]
    arrival_timeout: 10.0
    joint_tolerance: 0.05

task_queue:
  - skill: joint.movej_to_config
    id: poc_carry_start_movej
  # - skill: single_arm.move_to_pose
  #   id: pre_pick_tcp_waypoint
  - skill: single_arm.pick
  # 单手抓取后双臂可能不在搬运预备位；再次 movej 与首段相同，再执行 dual_arm.carry
  - skill: joint.movej_to_config
    id: poc_carry_start_movej
  - skill: dual_arm.carry
  - parallel:
      - skill: joint.movej_to_config
        id: lower_body_while_nav_to_shelf2
      - skill: dual_arm.bimanual_align
  - skill: dual_arm.place
  - skill: joint.movej_to_config
    id: return_to_navigate_pose

scene_presets:
  box01:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/middle_shelf/middle_shelf/Shelf_01/Level_03/box_01/box
      dual_arm.carry:
        object_prim_path: /World/middle_shelf/middle_shelf/Shelf_01/Level_03/box_01/box
  box02:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/middle_shelf/middle_shelf/Shelf_01/Level_03/box_02/box
      poc_carry_start_movej:
        body_positions: [-1.2, -2.4, -1.05, 0.0]
      dual_arm.carry:
        object_prim_path: /World/middle_shelf/middle_shelf/Shelf_01/Level_03/box_02/box
        orientation_delta_rpy: [0.0, -0.15, 0.0]
      dual_arm.bimanual_align:
        orientation_delta_rpy: [0.0, 0.15, 0.0]

  box03:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/middle_shelf/middle_shelf/Shelf_01/Level_03/box_03/box
      poc_carry_start_movej:
        body_positions: [ -1.1, -2.4, -1.05, 0.0 ]
        body_movej_duration: 2.0
      dual_arm.carry:
        object_prim_path: /World/middle_shelf/middle_shelf/Shelf_01/Level_03/box_03/box
        orientation_delta_rpy: [0.0, -0.25, 0.0]
        ee_lift_offset: [0.1, 0.0, -0.1]
      lower_body_while_nav_to_shelf2:
        body_positions: [ -0.1, 0.2, 0.3, 3.14 ]
        body_movej_duration: 4.0
      dual_arm.bimanual_align:
        orientation_delta_rpy: [ 0.0, 0.25, 0.0 ]
        arm_movel_duration: 4.0
      dual_arm.place:
        object_position_offset: [-0.57, 0.0, 1.27]
