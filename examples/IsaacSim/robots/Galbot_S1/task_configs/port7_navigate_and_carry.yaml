# FiveAges W2 — POC 项目：导航后双臂搬箱（基于 bimanual_carry 扩展）
#
# 合并顺序：base 扁平化 → skill_defaults（与 task_queue 块顺序一致书写）→ 场景扁平 → skill_params
#
# Sim reset（motion/record 的 reset_env）不随机物体。需要时在 task_queue **第一个顺序块**加：
#   skill: env.randomize_object_local_xyz
#   params: { object_prim_path: /World/.../some_prim, xyz_offset: [0.05, 0.05, 0.0] }

task_key: poc_port7_navigate_and_carry
label: "[PORT7] 导航后双臂搬黑箱子"
use_stamped: true
robot_id: galbot_s1_poc_navigate_and_carry
default_scene: box01

runtime_defaults:
  base_link_entity_path: /World/Galbot_S1/SteeringChassis/base_link/omni_chassis_base_link
  max_stage_duration: 2.0
  pose_tol_pos: 0.005
  pose_tol_ori: 0.05

task_queue:
  - parallel:
      - skill: joint.movej_to_config
        id: navigate_gesture
      - skill: nav.navigate_to_object
        id: nav_to_carry
  - skill: joint.movej_to_config
    id: pre_ocs2_carry_pose
  - skill: dual_arm.carry
  - parallel:
      - skill: dual_arm.bimanual_align
      - skill: nav.navigate_to_object
        id: nav_to_shelf2
        start_delay_s: 2.0
  # 到达 shelf2 后：相对当前持箱末端平移 → 放下 → 松爪 → 外张后撤（不依赖货架 prim）
  - skill: dual_arm.place

# 键顺序与 task_queue 中各块 id / skill 出现顺序一致（便于对照）
skill_defaults:
  # parallel[0]：与 nav_to_carry 并行 — 全身预备（与 bimanual_carry 起手位一致）
  navigate_gesture:
    body_positions: [ 0.75 ]
    left_arm_positions: [ -1.0, -1.38, -0.5, -1.5708, 0.0, 0.0, 0.0, ]
    right_arm_positions: [ -1.0, -1.38, -0.5, -1.5708, 0.0, 0.0, 0.0 ]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
  # parallel[1]
  nav_to_carry:
    object_prim_path: /World/scene/scene/port7/pallet2/pallet2
    approach_offset_x: -1.4
    approach_offset_y: 0.0
    yaw: 0
    timeout: 60.0

  pre_ocs2_carry_pose:
    body_positions: [ 0.4 ]
    left_arm_positions: [ 1.0, -1.38, -0.5, -1.5708, 0.0, 0.0, 0.0, ]
    right_arm_positions: [ 1.0, -1.38, -0.5, -1.5708, 0.0, 0.0, 0.0 ]
    arrival_timeout: 30.0
    joint_tolerance: 0.05
    body_movej_duration: 2.0
    resume_ocs2: true

  dual_arm.carry:
    arm_movel_duration: 2.0
    object_prim_path: /World/scene/scene/port7/box_black_03/black_box
    object_dual_arm_half_span_y: 0.312
    arm_merge_distance_y: 0.04
    object_position_offset: [ 0.01, 0.0, -0.062 ]
    left_base_orientation: [ 0.0, 0.0, 0.0, 1.0 ]
    right_base_orientation: [ 0.0, 0.0, 0.0, 1.0 ]
    ee_pregrasp_lift_offset: [ 0.0, 0.0, 0.1 ]
    ee_lift_offset: [ 0.0, 0.0, 0.0 ]

  # 第二段 parallel[0]
  nav_to_shelf2:
    object_prim_path: /World/scene/scene/port3/shelf2/shelf2
    approach_offset_x: 1.4
    approach_offset_y: 0.0
    yaw: 3.1415
    timeout: 20.0
  dual_arm.bimanual_align:
    align_position: [ 0.68, 0.0, 1.0 ]
    orientation_delta_rpy: [ 0.0, 0.15, 0.0 ]
    arm_movel_duration: 4.5

  # 相对放置：平移在 motion 系；若腰转后与 base 左右直觉不一致，设 motion_frame_id 为随腰 TF
  dual_arm.place:
    reference_object_prim_path: /World/scene/scene/port3/shelf2/shelf2
    object_position_offset: [ -0.57, 0.0, 0.75 ]
    arm_movel_duration: 2.0

scene_presets:
  box01:
    skill_params:
      dual_arm.carry:
        object_prim_path: /World/scene/scene/port7/box_black_01/black_box
  box02:
    skill_params:
      dual_arm.carry:
        object_prim_path: /World/scene/scene/port7/box_black_02/black_box
  box03:
    skill_params:
      pre_ocs2_carry_pose:
        body_positions: [ 0.25 ]
      dual_arm.carry:
        object_prim_path: /World/scene/scene/port7/box_black_03/black_box
      dual_arm.bimanual_align:
        align_position: [ 0.75, 0.0, 1.8 ]
        orientation_delta_rpy: [ 0.0, 0.05, 0.0 ]
      dual_arm.place:
        object_position_offset: [ -0.57, 0.0, 1.585 ]
  box04:
    skill_params:
      pre_ocs2_carry_pose:
        body_positions: [ 0.25 ]
      dual_arm.carry:
        object_prim_path: /World/scene/scene/port7/box_black_04/black_box
      dual_arm.bimanual_align:
        align_position: [ 0.75, 0.0, 1.8 ]
        orientation_delta_rpy: [ 0.0, 0.05, 0.0 ]
      dual_arm.place:
        object_position_offset: [ -0.57, 0.0, 1.585 ]
