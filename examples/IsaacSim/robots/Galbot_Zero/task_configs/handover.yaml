# Galbot Zero — 双臂交接（YAML）
# ``pick`` / ``handover`` / ``place`` 由 flatten_handover_task_overrides 合并。
# 见 examples/IsaacSim/docs/TASK_CONFIG_YAML.md

task_key: handover
label: Handover
kind: handover
use_stamped: true
robot_id: galbot_zero_bimanual_handover
default_scene: grab_medicine

base_task_overrides:
  pick:
    initial_grasp_arm: right
    object_xyz_random_offset: [ 0.0, 0.0, 0.0 ]
    approach_clearance: 0.15
    grasp_clearance: 0.0
    grasp_offset: [0.0, -0.01, 0.12]
    retreat_offset: [0.0, 0.0, 0.2]



    source_object_entity_path: /World/medicine_handover/FinasterideTablets/tablets/tablets
    grasp_orientation: [ -0.7, 0.7, 0.0, 0.0 ]
    grasp_direction: top
    grasp_direction_vector: null
  handover:
    handover_position: [0.5, 0.0, 1.2]
    source_handover_orientation: [-0.6230, 0.3431, -0.3431, 0.6230]
    receiver_handover_orientation: [-0.3293, 0.6280, -0.6280, 0.3293]
    receiver_handover_offset: [0.0, 0.0, -0.04]

  place:
    receiver_place_position: [0.65, 0.45, 1.0]
    receiver_place_orientation: [0.653, -0.271, 0.653, 0.271]
    run_place_after_handover: true

task_queue:
  - skill: handover.pregrasp
  - skill: handover.pick
  - skill: handover.exchange_place
  - skill: handover.movej_return_initial

scene_presets:
  grab_medicine:
    pick:
      source_object_entity_path: /World/medicine_handover/FinasterideTablets/tablets/tablets
  grab_bottle:
    pick:
      source_object_entity_path: /World/ConvenienceStore01/SM_Bottle_04_85
