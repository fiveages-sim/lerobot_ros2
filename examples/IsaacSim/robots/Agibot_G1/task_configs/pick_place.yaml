# Agibot G1 — pick / place（队列 + skill 参数分层）
#
# - runtime_defaults：流程级公共字段（容差等；mode 默认可省略）
# - skill_defaults：与 task_queue 中 single_arm.pick / single_arm.place 对齐的默认参数
# - scene_presets.skill_params：按场景覆盖 pick / place
#
# 合并顺序与 motion_main / 录制一致：base 扁平化 → skill_defaults → 场景扁平 → skill_params

task_key: pick_place
label: Pick Place
use_stamped: true
robot_id: agibot_g1_pick_place
default_scene: grab_medicine

runtime_defaults:
  max_stage_duration: 2.0
  pose_tol_pos: 0.025
  pose_tol_ori: 0.08

skill_defaults:
  single_arm.pick:
    arm: right
    prepare_offset: [0.0, 0.0, 0.2]
    object_prim_path: /World/medicine_handover/FinasterideTablets/tablets/tablets
    ee_base_orientation: [-0.7, 0.7, 0.0, 0.0]
  single_arm.place:

task_queue:
  - skill: robot.cache_ee_pose
    params:
      key: agibot_g1_prep_pose
  - skill: single_arm.pick
  - skill: single_arm.place
  - skill: single_arm.goto_cache_pose
    params:
      key: agibot_g1_prep_pose

scene_presets:
  grab_medicine:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/medicine_handover/FinasterideTablets/tablets/tablets
        arm: right

  grab_bottle:
    skill_params:
      single_arm.pick:
        object_prim_path: /World/ConvenienceStore01/SM_Bottle_04_85/SM_Bottle_04
        arm: left
        ee_base_orientation: [-0.5, 0.5, -0.5, 0.5]
        object_position_offset: [0.0, 0.0, 0.1]
        prepare_offset: [0.0, 0.0, 0.2]
        ee_lift_offset: [0.0, 0.0, 0.1]
        ee_retreat_offset: [0.0, 0.0, 0.1]
