# Agibot G1 — handover（纯 skill_defaults / skill_params）

task_key: handover
label: Handover
use_stamped: true
robot_id: agibot_g1_bimanual_handover
default_scene: grab_medicine

base_task_overrides:
  max_stage_duration: 2.0
  pose_tol_pos: 0.025
  pose_tol_ori: 0.08
  require_orientation_reach: false
  use_object_orientation: false

skill_defaults:
  dual_arm.handover:
    handover_position: [0.55, 0.0, 1.3]
    source_handover_orientation: [-0.77, 0.0, 0.0, 0.77]
    receiver_handover_orientation: [0.0, 0.77, -0.77, 0.0]
    receiver_handover_offset: [0.0, -0.01, -0.03]

  single_arm.place:
    arm: left
    place_position: [0.9, 0.25, 1.1]
    place_orientation:
      [-0.33016505084249775, 0.6534009839213628, -0.6175486972275431, 0.2875618193803384]
    run_place_before_return: true

  single_arm.pick:
    arm: right
    grasp_orientation: [-0.7, 0.7, 0.0, 0.0]
    object_xyz_random_offset: [0.0, 0.0, 0.0]
    approach_clearance: 0.2
    grasp_clearance: 0.011
    grasp_offset: [0.02, 0.0, 0.0]
    source_object_entity_path: /World/medicine_handover/FinasterideTablets/tablets/tablets
    grasp_direction: top
    grasp_direction_vector: null

task_queue:
  - skill: robot.cache_ee_pose
    params:
      which: both
      key: ho_prep_pose
  - skill: single_arm.pregrasp
    id: ho_pregrasp
  - skill: single_arm.pick
    id: ho_pick
  - skill: dual_arm.handover_sync
  - skill: single_arm.place
  - skill: dual_arm.goto_cache_pose
    params:
      key: ho_prep_pose

scene_presets:
  grab_medicine:
    skill_params:
      ho_pick:
        source_object_entity_path: /World/medicine_handover/FinasterideTablets/tablets/tablets

  grab_bottle:
    skill_params:
      ho_pick:
        source_object_entity_path: /World/ConvenienceStore01/SM_Bottle_04_85

record:
  base_record_overrides:
    task_name: handover
    fps: 30
    camera_info_timeout: 10.0
    switch_to_hold_after_episode: true
    async_episode_save: true
    episode_save_queue_size: 2
    enable_keypoint_pcd: false
    include_depth_feature: false
    image_writer_processes: 0
    image_writer_threads: 8
    video_encoding_batch_size: 5
  profiles:
    - key: default
      label: Default
      overrides: {}
    - key: fast
      label: Fast Encode Queue
      overrides:
        image_writer_threads: 12
        video_encoding_batch_size: 10
